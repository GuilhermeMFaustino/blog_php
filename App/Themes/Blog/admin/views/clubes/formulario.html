{% extends "main.html" %}

{% block content %}

<div class="nxl-content">
    <!-- PAGE HEADER -->
    <div class="page-header">
        <div class="page-header-left">
            <h5>Usuario</h5>
        </div>
    </div>
    <!-- MAIN CONTENT -->
    <div class="main-content">
        <div class="row">
            <div class="col-lg-12">
                <div class="card stretch stretch-full">
                    <div class="card-body">
                        <form
                            action="{% if clubesEdit.id %}{{ url('/admin/clubes/update/' ~ clubesEdit.id) }}{% else %}{{ url('/admin/clubes/save') }}{% endif %}"
                            method="POST" enctype="multipart/form-data">

                            <div class="tab-pane fade show active" id="profileTab" role="tabpanel">
                                <div class="card-body personal-info">

                                    <div class="row">
                                        <div class="col-lg-6 mb-4">
                                            <label for="exampleFormControlInput1" class="form-label">Nome do Clube</label>
                                            <input type="text" name="name" id="fundacao" class="form-control"
                                                value="{{ clubesEdit.name }}" placeholder="Nome do Clube">
                                        </div>
                                        <div class="col-lg-6 mb-4">
                                             <label for="exampleFormControlInput1" class="form-label">Selecione a cidades do Clube</label>
                                            <select class="form-control" name="city">
                                                {% for citi in city %}
                                                <option value="{{ citi.id }}">
                                                    {{ citi.name }}
                                                </option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                        
                                        <div class="col-lg-6 mb-4">
                                            <label for="exampleFormControlInput1" class="form-label">Data de Fundação do Clube</label>
                                            <input type="date" name="data_titulo" id="fundacao" class="form-control"
                                                value="{{clubesEdit.data_titulo }}" placeholder="data de Fundacão.">
                                        </div>

                                        <div class="col-lg-6 mb-4">
                                            <label for="exampleFormControlInput1" class="form-label">Cores do Clube</label>
                                            <input type="text" name="cores" id="cores" class="form-control"
                                                value="{{clubesEdit.cores}}" placeholder="Cores do Clube">
                                        </div>
                                        <div class="col-lg-6 mb-4">
                                            <label for="exampleFormControlInput1" class="form-label">Titulos / Campeonatos</label>
                                            <input type="text" name="title" id="titulo" class="form-control"
                                                value="{{clubesEdit.title}}" placeholder="Quantidades Titulos do Clube">
                                        </div>
                                        <div class="mb-3">
                                            <label for="exampleFormControlInput1" class="form-label">Campo / Estadio</label>
                                            <input type="text" name="estadio" id="estadio" class="form-control"
                                                value="{{clubesEdit.estadio}}" placeholder="Estadio">
                                        </div>

                                        <div class="mb-3">
                                            <input class="form-check-input status-check" type="radio" name="status"
                                                value="1" {% if times.status==1 %}checked{% endif %} id="checkDefault">
                                            <label class="form-check-label" for="checkDefault">
                                                ativo
                                            </label>
                                        </div>
                                        <div class="mb-3">
                                            <input class="form-check-input status-check" type="radio" name="status"
                                                value="0" {% if times.status==0 %}checked{% endif %} id="checkChecked">
                                            <label class="form-check-label" for="checkChecked">
                                                Inativo
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <input type="submit" class="btn btn-primary"
                                value="{% if clubesEdit.id %}Atualizar{% else %}Cadastrar{% endif %}">
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="tab-content">

    {% endblock %}
