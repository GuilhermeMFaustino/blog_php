{% extends "main.html" %}

{% block content %}

<div class="nxl-content">
  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-header-left">
      <h5>Usuario</h5>
    </div>
  </div>
  <!-- MAIN CONTENT -->
  <div class="main-content">
    <div class="row">
      <div class="col-lg-12">
        <div class="card stretch stretch-full">
          <div class="card-body">
            <form
              action="{% if videosEdit.id %}{{url('/admin/videos/editar/'~videosEdit.id)}}{% else %}{{url('/admin/videos/editar')}}{% endif %}"
              method="POST" enctype="multipart/form-data">
              <div class="tab-pane fade show active" id="profileTab" role="tabpanel">
                <div class="card-body personal-info">
                  <div class="mb-4 d-flex align-items-center justify-content-between">
                    <h5 class="fw-bold mb-0 me-4">
                      <span class="d-block mb-2"></span>
                    </h5>
                  </div>
                  <div class="row mb-4 align-items-center">
                    <div class="col-lg-8">
                      <div class="input-group">
                        <div class="input-group-text"><i class="feather feather-type"></i></div>
                        <input type="text" name="name" class="form-control" id="fullnameInput"
                          value="{{ videosEdit.video }}" placeholder="Nome do Video">
                      </div>
                    </div>
                  </div>
                  <div class="row mb-4 align-items-center">
                    <div class="col-lg-8">
                      <div class="input-group">
                        <div class="input-group-text"><i class="feather feather-file-text"></i></div>
                        <input type="text" name="description" class="form-control" id="fullnameInput"
                          value="{{ videosEdit.description }}" placeholder="Descricao do Video">
                      </div>
                    </div>
                  </div>
                  <div class="row mb-4 align-items-center">
                    <div class="col-lg-8">
                      <div class="input-group">
                        <div class="input-group-text"><i class="feather-video"></i></div>
                        <input type="text" name="video" class="form-control" id="mailInput"
                          value="{{ videosEdit.video }}" placeholder="Video">
                      </div>
                    </div>
                  </div>
                  <div class="row mb-4 align-items-center ">
                    <div class="col-lg-8">
                      <select class="form-control" data-select2-selector="status" name="status">
                        <option value="1" {% if videosEdit.status==1 %}selected{% endif %} data-bg="bg-success"
                          class="wd-7 ht-7 rounded-circle bg-success">
                          Active
                        </option>
                        <option value="0" {% if videosEdit.status==0 %}selected{% endif %} data-bg="bg-warning"
                          class="wd-7 ht-7 rounded-circle bg-success">
                          Inactive
                        </option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>
              <input type="submit" class="btn btn-primary"
                value="{% if videosEdit.id %}Atualizar{% else %}Cadastrar{% endif %}">
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="tab-content">

  {% endblock %}
