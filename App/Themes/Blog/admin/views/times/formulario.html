{% extends "main.html" %}

{% block content %}

<div class="nxl-content">
  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-header-left">
      <h5>Times</h5>
    </div>
  </div>
  <!-- MAIN CONTENT -->
  <div class="main-content">
    <div class="row">
      <div class="col-lg-12">
        <div class="card stretch stretch-full">
          <div class="card-body">
            <form
              action="{% if timesEdit.id %}{{url('/admin/times/update/'~timesEdit.id)}}{% else %}{{url('/admin/times/save')}}{% endif %}"
              method="POST" enctype="multipart/form-data">
              <div class="tab-pane fade show active" id="profileTab" role="tabpanel">
                <div class="card-body personal-info">
                  <div class="mb-4 d-flex align-items-center justify-content-between">
                    <h5 class="fw-bold mb-0 me-4">
                      <label>Time</label>
                      <span class="d-block mb-2"></span>
                    </h5>

                    
                  </div>
                  <div class="row mb-4 align-items-center">

                    <div class="row mb-4 align-items-center">
                    <div class="col-lg-8">
                      <div class="mb-4 mb-md-0 d-flex gap-4 your-brand">
                        <div class="wd-200 ht-200 position-relative overflow-hidden border border-gray-2 rounded">
                          <img id="preview_image" src="{{ userEdite.avatar ? url('App/Themes/Blog/admin/assets/images/avatar/'~userEdite.avatar) : url('App/Themes/Blog/admin/assets/images/avatar/undefined.png')
                          }}" class="upload-pic img-fluid rounded h-300 w-300" alt="">
                        </div>
                        <input type="file" name="imagem" id="files" onchange="preview(this);" accept="image/*">
                        <script>
                          function preview(input) {
                            if (input.files && input.files[0]) {
                              var reader = new FileReader();
                              reader.onload = function (e) {
                                $('#preview_image')
                                  .attr('src', e.target.result)
                                  .width(250)
                                  .height(250);
                              };
                              reader.readAsDataURL(input.files[0]);
                            }
                          }
                        </script>
                        <div class="d-flex flex-column gap-1">
                          <div class="fs-11 text-gray-500 mt-2"># Upload your prifile</div>
                          <div class="fs-11 text-gray-500"># Avatar size 250x250</div>
                          <div class="fs-11 text-gray-500"># Max upload size 8mb</div>
                          <div class="fs-11 text-gray-500"># Allowed file types: png, jpg, jpeg</div>
                        </div>
                      </div>
                    </div>
                  </div>
                    <div class="col-lg-8">
                      <div class="input-group">                        
                        <div class="input-group-text"><i class="feather-award"></i></div>
                        <input type="text" name="time" class="form-control" id="fullnameInput"
                          value="{{ timesEdit.time }}" placeholder="Digite o nome do time">
                      </div>
                    </div>
                  </div>
                  <div class="form-check">
                <input class="form-check-input status-check" type="radio" name="status" value="1" {% if editarcategoria.status == 1 %}checked{% endif %} id="checkDefault">
                <label class="form-check-label" for="checkDefault">
                    ativo
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input status-check" type="radio" name="status" value="0" {% if editarcategoria.status == 0 %}checked{% endif %} id="checkChecked">
                <label class="form-check-label" for="checkChecked">
                    Inativo
                </label>
            </div>
              <input type="submit" class="btn btn-primary"
                value="{% if timesEdit.id %}Atualizar{% else %}Cadastrar Time{% endif %}">
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="tab-content">

  {% endblock %}
